name: Sync to PythonAnywhere

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PA_USERNAME: ${{ secrets.PA_USERNAME }}
      PA_PROJECT_PATH: ${{ secrets.PA_PROJECT_PATH }}
      PA_BRANCH: ${{ secrets.PA_BRANCH }}
      PA_INSTALL_REQUIREMENTS: ${{ secrets.PA_INSTALL_REQUIREMENTS }}
      PA_VENV_PYTHON: ${{ secrets.PA_VENV_PYTHON }}
      PA_POST_SYNC_COMMAND: ${{ secrets.PA_POST_SYNC_COMMAND }}
      PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
      PA_SSH_PRIVATE_KEY: ${{ secrets.PA_SSH_PRIVATE_KEY }}
      PA_ALLOW_CONSOLE_MODE: ${{ secrets.PA_ALLOW_CONSOLE_MODE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required sync config
        run: |
          missing=0
          if [ -z "$PA_USERNAME" ]; then
            echo "::error::Missing required secret: PA_USERNAME"
            missing=1
          else
            echo "PA_USERNAME is configured"
          fi

          if [ -z "$PA_API_TOKEN" ] && [ -z "$PA_SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing authentication config. Set PA_SSH_PRIVATE_KEY (preferred) or PA_API_TOKEN."
            missing=1
          elif [ -n "$PA_SSH_PRIVATE_KEY" ]; then
            echo "Using SSH sync mode (preferred unattended mode)"
          else
            echo "PA_API_TOKEN is configured"
          fi

          allow_console_mode="${PA_ALLOW_CONSOLE_MODE:-false}"
          allow_console_mode="$(echo "$allow_console_mode" | tr '[:upper:]' '[:lower:]')"
          if [ -z "$PA_SSH_PRIVATE_KEY" ] && [ "$allow_console_mode" != "true" ]; then
            echo "::error::Console API mode is disabled by default. Set PA_SSH_PRIVATE_KEY for unattended deploys, or set PA_ALLOW_CONSOLE_MODE=true to allow fallback."
            missing=1
          elif [ -z "$PA_SSH_PRIVATE_KEY" ] && [ "$allow_console_mode" = "true" ]; then
            echo "Console API fallback is explicitly enabled (PA_ALLOW_CONSOLE_MODE=true)"
          fi

          if [ -z "$PA_PROJECT_PATH" ]; then
            echo "PA_PROJECT_PATH is not set; workflow will use fallback: /home/<PA_USERNAME>/<repo-name>"
          else
            echo "PA_PROJECT_PATH is configured"
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Trigger sync via SSH
        if: ${{ env.PA_SSH_PRIVATE_KEY != '' }}
        run: |
          set -e
          branch="${PA_BRANCH:-main}"
          if [ -n "${PA_PROJECT_PATH:-}" ]; then
            project_path="$PA_PROJECT_PATH"
          else
            project_path="/home/$PA_USERNAME/${GITHUB_REPOSITORY##*/}"
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$PA_SSH_PRIVATE_KEY" > ~/.ssh/pythonanywhere_deploy_key
          chmod 600 ~/.ssh/pythonanywhere_deploy_key
          ssh-keyscan -H ssh.pythonanywhere.com >> ~/.ssh/known_hosts

          remote_cmd="set -e; cd '$project_path'; git fetch origin '$branch'; git reset --hard origin/'$branch'; git clean -fd"
          if [ "${PA_INSTALL_REQUIREMENTS:-false}" = "true" ]; then
            if [ -n "${PA_VENV_PYTHON:-}" ]; then
              remote_cmd="$remote_cmd; '$PA_VENV_PYTHON' -m pip install -r requirements.txt"
            else
              remote_cmd="$remote_cmd; python3 -m pip install -r requirements.txt"
            fi
          fi
          if [ -n "${PA_POST_SYNC_COMMAND:-}" ]; then
            remote_cmd="$remote_cmd; ${PA_POST_SYNC_COMMAND}"
          fi

          ssh -i ~/.ssh/pythonanywhere_deploy_key "$PA_USERNAME@ssh.pythonanywhere.com" "$remote_cmd"

      - name: Trigger PythonAnywhere sync
        if: ${{ env.PA_SSH_PRIVATE_KEY == '' && env.PA_ALLOW_CONSOLE_MODE == 'true' }}
        run: python .github/scripts/pythonanywhere_sync.py
